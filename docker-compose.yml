services:
  postgres:
    image: docker.io/postgres:13
    container_name: airflow_postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_compose_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow:
    build: .
    container_name: airflow_webserver
    restart: on-failure
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
      AIRFLOW__API__AUTH_BACKEND: airflow.api.auth.backend.basic_auth
      AIRFLOW__WEBSERVER__PROXY_FIX_X_FOR: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_HOST: "1"
      AIRFLOW__WEBSERVER__PROXY_FIX_X_PREFIX: "1"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow

    ports:
      - "8083:8080"
      - "8085:8085"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./plugins:/opt/airflow/plugins
      - ./logs:/opt/airflow/logs
      - ./Data:/opt/airflow/data
      - ./dbt_pro:/opt/airflow/dbt_pro
      - ./id.json:/opt/airflow/id.json:ro

    depends_on:
      postgres:
        condition: service_healthy
    command: ["airflow", "standalone"]

  pgadmin:
    image: docker.io/dpage/pgadmin4
    container_name: airflow_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  streamlit:
    build: ./streamlit
    container_name: streamlit
    restart: on-failure
    volumes:
      - ./streamlit:/app
      - ./Data:/app/data
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "/app/app.py"]

volumes:
  airflow_compose_postgres_data:
  airflow_compose_airflow_data:
  pgadmin_data:


