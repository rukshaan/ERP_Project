version: 2

models:

  # -----------------------------
  # FACT TABLE
  # -----------------------------
  - name: fact_sales_order
    description: "Final fact table joining sales orders with item, customer, and company dimensions using surrogate keys"
    columns:
      - name: sales_order_id
        description: "Unique identifier for the sales order"
        tests:
          - not_null
          

      - name: customer_key
        description: "Surrogate key for the customer from dim_customer (nullable - LEFT JOIN)"

      - name: item_key
        description: "Surrogate key for the item from dim_item (nullable - LEFT JOIN)"

      - name: company_key
        description: "Surrogate key for the company from dim_company (nullable - LEFT JOIN)"

      - name: customer_name
        description: "Name of the customer associated with the sales order"
        tests:
          - not_null

      - name: item_code
        description: "Business key for the item"
        tests:
          - not_null

      - name: item_name
        description: "Descriptive name of the item"

      - name: order_date
        description: "Date when the order was placed"
        tests:
          - not_null

      - name: delivery_date
        description: "Date when the order was delivered"

      - name: qty
        description: "Quantity of the item ordered"
        tests:
          - not_null

      - name: rate
        description: "Unit price of the item"

      - name: amount
        description: "Total amount for the sales order"
        tests:
          - not_null

      - name: open_qty
        description: "Remaining quantity not yet delivered"

      - name: open_amount
        description: "Remaining amount not yet delivered"

      - name: order_status
        description: "Current status of the order"

      - name: is_fully_delivered
        description: "Flag indicating whether the order has been fully delivered"

      - name: warehouse
        description: "Warehouse from which the order is fulfilled"

      - name: company
        description: "Name of the company fulfilling the order"

  # -----------------------------
  # CUSTOMER DIMENSION
  # -----------------------------
  - name: dim_customer
    description: "Dimension table for customers (current state only)"
    columns:
      - name: customer_key
        description: "Surrogate key for the customer"
        tests:
          - not_null
          

      - name: customer_id
        description: "Business key / natural key for the customer"
        tests:
          - not_null

      - name: customer_name
        description: "Name of the customer"
        tests:
          - not_null

      - name: territory
        description: "Customer's territory or region"
        tests:
          - not_null

      - name: customer_type
        description: "Type of customer (e.g., Retail, Wholesale)"
        tests:
          - not_null

      - name: customer_group
        description: "Customer group classification"
        tests:
          - not_null

      - name: customer_primary_address
        description: "Primary address of the customer"

      - name: sales_team_name
        description: "Sales team associated with the customer"

      - name: is_internal_customer
        description: "Flag to indicate internal customer"

      - name: email_id
        description: "Customer email address"

      - name: mobile_no
        description: "Customer mobile number"

  # -----------------------------
  # ITEM DIMENSION
  # -----------------------------
  - name: dim_item
    description: "Dimension table for items (current state only)"
    columns:
      - name: item_key
        description: "Surrogate key for the item"
        tests:
          - not_null
          

      - name: item_code
        description: "Business key / natural key for the item"
        tests:
          - not_null

      - name: item_name
        description: "Descriptive name of the item"
        tests:
          - not_null

      - name: standard_rate
        description: "Standard rate of the item"

      - name: asset_category
        description: "Category of the asset / item"

      - name: country_of_origin
        description: "Country where the item is manufactured"

      - name: customer_code
        description: "Optional: associated customer code for the item"

      - name: owner
        description: "Owner of the item"

      - name: warranty_period
        description: "Warranty period in months / years"

      - name: weight_uom
        description: "Unit of measurement for weight"

      - name: weight_per_unit
        description: "Weight per unit of item"

  # -----------------------------
  # COMPANY DIMENSION
  # -----------------------------
  - name: dim_company
    description: "Dimension table for companies"
    columns:
      - name: company_key
        description: "Surrogate key for the company"
        tests:
          - not_null
          - unique

      - name: company
        description: "Business name of the company"
        tests:
          - not_null

  # -----------------------------
  # DATE DIMENSION
  # -----------------------------
  - name: dim_date
    description: "Date dimension generated from sales order and delivery dates"
    columns:
      - name: date_key
        description: "Surrogate key for the date"
        tests:
          - not_null
      - name: date_value
        description: "Date value for the dimension"
        tests:
          - not_null

      - name: year
        description: "Year part of the date"
        tests:
          - not_null

      - name: month
        description: "Month part of the date"
        tests:
          - not_null

      - name: day
        description: "Day part of the date"
        tests:
          - not_null
  - name: fact_sales_invoice
    description: "Fact table for Sales Invoice, mapped to customer, company, and date dimensions."
    columns:
      
          
      - name: sales_invoice_id
        description: "Original sales invoice ID from source."
        tests:
          - not_null
      - name: customer_key
        description: "Surrogate key linking to dim_customer."
      - name: company_key
        description: "Surrogate key linking to dim_company."
      - name: creation_date_key
        description: "Surrogate key linking to dim_date for invoice creation."
      - name: posting_date_key
        description: "Surrogate key linking to dim_date for invoice posting."
      - name: due_date_key
        description: "Surrogate key linking to dim_date for invoice due date."
      - name: status
        description: "Invoice status (Draft, Submitted, Paid, etc.)."
      - name: docstatus
        description: "Document status code."
      - name: is_return
        description: "Flag indicating if invoice is a return."
      - name: is_pos
        description: "Flag indicating if invoice is POS type."
      - name: is_discounted
        description: "Flag indicating if any discount applied."
      - name: currency
        description: "Currency code."
      - name: conversion_rate
        description: "Currency conversion rate to base currency."
      - name: total_qty
        description: "Total quantity of items in invoice."
      - name: net_total
        description: "Net total amount of invoice."
      - name: grand_total
        description: "Grand total including taxes."
      - name: rounded_total
        description: "Rounded total amount."
      - name: outstanding_amount
        description: "Amount yet to be paid."
      - name: paid_amount
        description: "Amount paid."
      - name: discount_amount
        description: "Total discount applied."
      - name: additional_discount_percentage
        description: "Additional discount in percentage."
      - name: customer_address
        description: "Customer billing address."
      - name: shipping_address
        description: "Shipping address."
      - name: items
        description: "Nested array of invoice line items."
      - name: payments
        description: "Nested array of payments."
      - name: payment_schedule
        description: "Payment schedule, if any."
      - name: sales_team
        description: "Sales team involved in invoice."
      - name: taxes
        description: "Taxes applied on invoice."
      - name: remarks
        description: "Additional remarks or notes."
      - name: creationdate
        description: "Record creation timestamp."
      - name: batchid
        description: "ETL batch identifier."
      - name: md5
        description: "MD5 hash for change tracking or uniqueness."

  - name: fact_quotation
    description: "Fact table for Sales Quotation, mapped to customer, company, and date dimensions."
    columns:
      - name: fact_quotation_item_key
        description: "Surrogate key for quotation fact (MD5 of quotation_id + item_code)."
        tests:
          - not_null
          - unique
      - name: quotation_id
        description: "Original quotation ID from source."
        tests:
          - not_null
      - name: customer_key
        description: "Surrogate key linking to dim_customer."
      - name: company_key
        description: "Surrogate key linking to dim_company."
      - name: creation_date_key
        description: "Surrogate key linking to dim_date for quotation creation."
      - name: posting_date_key
        description: "Surrogate key linking to dim_date for quotation posting."
      - name: expiry_date_key
        description: "Surrogate key linking to dim_date for quotation expiry."
      - name: status
        description: "Quotation status (Draft, Submitted, etc.)."
      - name: total_qty
        description: "Total quantity of items in quotation."
      - name: net_total
        description: "Net total amount."
      - name: grand_total
        description: "Grand total including taxes."
      - name: currency
        description: "Currency code."
      - name: discount_amount
        description: "Total discount applied."
      - name: additional_discount_percentage
        description: "Additional discount percentage, if any."
      - name: customer_address
        description: "Customer billing address."
      - name: shipping_address
        description: "Shipping address."
      - name: items
        description: "Nested array of quotation line items."
      - name: taxes
        description: "Taxes applied on quotation."
      - name: sales_team
        description: "Sales team responsible for the quotation."
      - name: remarks
        description: "Additional notes or remarks."
      - name: creationdate
        description: "Record creation timestamp."
      - name: batchid
        description: "ETL batch identifier."
      - name: md5
        description: "MD5 hash for change tracking or uniqueness."